name: CI + Build ZMK Firmware

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ZEPHYR_TOOLCHAIN_VARIANT: zephyr
      ZEPHYR_SDK_INSTALL_DIR: ${{ github.workspace }}/zephyr-sdk

    steps:
      # -------------------------
      # Checkout repository
      # -------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------------
      # Node.js 24 setup and tasks
      # -------------------------
      - name: Setup Node.js 24
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      - name: Install Node dependencies
        if: exists('package.json')
        run: npm install

      - name: Run Node tests
        if: exists('package.json')
        run: npm test

      - name: Lint Node code
        if: exists('package.json')
        run: npm run lint

      # -------------------------
      # Python / Zephyr / ZMK setup
      # -------------------------
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gperf dfu-util device-tree-compiler python3-pip python3-setuptools python3-wheel python3-dev

      - name: Install West (Zephyr meta-tool)
        run: pip install --upgrade west

      # Cache Zephyr/WEST build to speed up CI
      - name: Cache West & Build
        uses: actions/cache@v3
        with:
          path: |
            ~/.west
            ~/.cache/zephyr
            build
          key: ${{ runner.os }}-zmk-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-zmk-

      - name: Initialize Zephyr modules
        run: |
          west init -l .
          west update

      - name: Build ZMK Firmware
        run: |
          west build -s app -b nice_nano_v2 -d build \
            -DSHIELD=Macropad \
            -DZMK_CONFIG=${{ github.workspace }}/config \
            -DZMK_EXTRA_MODULES=${{ github.workspace }}/zmk-config-macropad

      # -------------------------
      # Optional: switch Node.js to 20
      # -------------------------
      - name: Setup Node.js 20 (optional)
        uses: actions/setup-node@v3
        with:
          node-version: '20'