name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Force all JavaScript actions to run on Node.js 24 now
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # Checkout your repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Node.js 24 (you can switch to 20 if needed temporarily)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Run tests
      - name: Run tests
        run: npm test

      # Optional: Lint code
      - name: Lint
        run: npm run lint
name: Build ZMK Firmware

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ZEPHYR_TOOLCHAIN_VARIANT: zephyr
      ZEPHYR_SDK_INSTALL_DIR: ${{ github.workspace }}/zephyr-sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install required packages
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gperf dfu-util device-tree-compiler python3-pip python3-setuptools python3-wheel python3-dev

      - name: Install West (Zephyr meta-tool)
        run: pip install --upgrade west

      - name: Initialize Zephyr modules
        run: |
          west init -l .
          west update

      - name: Build ZMK Firmware
        run: |
          west build -s app -b nice_nano_v2 -d build \
            -DSHIELD=Macropad \
            -DZMK_CONFIG=${{ github.workspace }}/config \
            -DZMK_EXTRA_MODULES=${{ github.workspace }}/zmk-config-macropad